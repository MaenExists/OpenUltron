<div class="space-y-4">
    {% for task in history %}
    <div class="p-3 bg-gray-50 border-l-4 {{ 'border-green-500' if task.outcome == 'win' else 'border-red-500' if task.outcome == 'loss' else 'border-gray-300' }} rounded-r-lg hover:shadow-md transition">
        <div class="flex justify-between items-center mb-1">
            <span class="text-[10px] font-mono font-bold text-gray-500 uppercase">{{ task.task_id }}</span>
            <span class="text-[10px] px-2 py-0.5 rounded font-black uppercase {{ 'bg-green-100 text-green-700' if task.outcome == 'win' else 'bg-red-100 text-red-700' if task.outcome == 'loss' else 'bg-gray-100 text-gray-600' }}">
                {{ task.outcome }}
            </span>
        </div>
        <p class="text-sm text-gray-800 font-medium leading-tight mb-2 truncate" title="{{ task.description }}">
            {{ task.description }}
        </p>
        <div class="flex justify-between items-center text-[10px] text-gray-400 font-bold uppercase tracking-wider">
            <span>{{ task.api_calls_used }} API CALLS</span>
            <span>PHASE {{ task.phase_reached }} REACHED</span>
        </div>
    </div>
    {% else %}
    <p class="text-sm text-gray-400 italic">No tasks recorded yet.</p>
    {% endfor %}
</div>
