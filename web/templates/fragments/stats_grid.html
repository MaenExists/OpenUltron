{% set wins = stats.get('win', 0) %}
{% set losses = stats.get('loss', 0) %}
{% set total = stats.get('total', 0) %}
{% set win_rate = (wins / total * 100)|round(1) if total > 0 else 0 %}

<h3 class="text-lg font-bold mb-4 uppercase tracking-tighter border-b pb-2">Execution Metrics</h3>
<div class="grid grid-cols-2 gap-4">
    <div class="bg-gray-50 p-4 rounded-lg border border-gray-100 text-center">
        <span class="text-xs font-bold text-gray-500 uppercase block mb-1">Total Tasks</span>
        <span class="text-2xl font-black text-gray-900">{{ total }}</span>
    </div>
    <div class="bg-gray-50 p-4 rounded-lg border border-gray-100 text-center">
        <span class="text-xs font-bold text-gray-500 uppercase block mb-1">Win Rate</span>
        <span class="text-2xl font-black {{ 'text-green-600' if win_rate > 50 else 'text-red-600' }}">{{ win_rate }}%</span>
    </div>
    <div class="bg-green-50 p-4 rounded-lg border border-green-100 text-center">
        <span class="text-xs font-bold text-green-700 uppercase block mb-1">Wins</span>
        <span class="text-2xl font-black text-green-800">{{ wins }}</span>
    </div>
    <div class="bg-red-50 p-4 rounded-lg border border-red-100 text-center">
        <span class="text-xs font-bold text-red-700 uppercase block mb-1">Losses</span>
        <span class="text-2xl font-black text-red-800">{{ losses }}</span>
    </div>
</div>
