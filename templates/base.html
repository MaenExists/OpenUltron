<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenUltron // Monolithic Void</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Sora:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              void: {
                DEFAULT: "#000000",
                950: "#000000",
                900: "#050505",
                850: "#0a0a0a",
                800: "#111111",
                700: "#1a1a1a",
                600: "#262626",
              },
              emerald: {
                pulse: "#10b981",
              },
              stardust: "#f9fafb",
              mist: "#9ca3af",
            },
            fontFamily: {
              display: ["Sora", "sans-serif"],
              body: ["Plus Jakarta Sans", "sans-serif"],
              mono: ["JetBrains Mono", "monospace"],
            },
            boxShadow: {
              'emerald-glow': "0 0 15px rgba(16, 185, 129, 0.2)",
              'subtle-border': "inset 0 0 0 1px rgba(255, 255, 255, 0.05)",
            },
            animation: {
              'pulse-emerald': 'pulse-emerald 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'fade-in': 'fade-in 0.5s ease-out',
            },
            keyframes: {
              'pulse-emerald': {
                '0%, 100%': { opacity: 0.4, transform: 'scale(1)' },
                '50%': { opacity: 1, transform: 'scale(1.05)' },
              },
              'fade-in': {
                '0%': { opacity: 0, transform: 'translateY(4px)' },
                '100%': { opacity: 1, transform: 'translateY(0)' },
              }
            }
          },
        },
      };
    </script>
    <style type="text/tailwindcss">
      @layer base {
        body {
          @apply bg-void text-mist font-body antialiased selection:bg-emerald-pulse/30 selection:text-stardust;
        }
        h1, h2, h3, h4 {
          @apply font-display font-semibold text-stardust tracking-tight;
        }
        ::-webkit-scrollbar {
          width: 4px;
        }
        ::-webkit-scrollbar-track {
          @apply bg-void;
        }
        ::-webkit-scrollbar-thumb {
          @apply bg-void-700 rounded-full hover:bg-void-600 transition-colors;
        }
      }

      @layer components {
        .panel {
          @apply rounded-xl border border-white/[0.03] bg-void-900 shadow-subtle-border transition-all duration-300;
        }
        .panel-hover {
          @apply hover:border-white/[0.08] hover:bg-void-850;
        }
        .btn-action {
          @apply flex items-center justify-center gap-2 rounded-lg px-4 py-2 text-xs font-medium transition-all duration-200 disabled:opacity-30;
        }
        .btn-emerald {
          @apply bg-emerald-pulse/10 text-emerald-pulse border border-emerald-pulse/20 hover:bg-emerald-pulse/20 hover:border-emerald-pulse/30;
        }
        .btn-ghost {
          @apply bg-white/[0.02] text-mist border border-white/[0.05] hover:bg-white/[0.05] hover:text-stardust;
        }
        .input-void {
          @apply w-full rounded-lg border border-white/[0.05] bg-void-800 px-3 py-2 text-xs text-stardust placeholder:text-void-600 focus:border-emerald-pulse/40 focus:outline-none focus:ring-1 focus:ring-emerald-pulse/20 transition-all;
        }
        .label-void {
          @apply text-[10px] uppercase tracking-[0.2em] font-bold text-void-600;
        }
      }

      .grain-overlay {
        position: fixed;
        inset: 0;
        z-index: 50;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        opacity: 0.02;
      }

      .radial-pulse {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: radial-gradient(circle at 50% 50%, rgba(16, 185, 129, 0.03) 0%, transparent 70%);
        pointer-events: none;
        z-index: 0;
      }

      /* HTMX Indicator */
      .htmx-indicator {
        opacity: 0;
        transition: opacity 200ms ease-in;
      }
      .htmx-requesting .htmx-indicator {
        opacity: 1;
      }
      .htmx-requesting {
        cursor: wait;
      }
    </style>
  </head>
  <body class="relative min-h-screen overflow-x-hidden flex flex-col">
    <div class="grain-overlay"></div>
    <div class="radial-pulse"></div>

    <header class="relative z-40 flex items-center justify-between px-6 py-4 border-b border-white/[0.03] bg-void/50 backdrop-blur-md sticky top-0">
      <div class="flex items-center gap-4">
        <div class="h-8 w-8 flex items-center justify-center rounded-lg bg-emerald-pulse/5 border border-emerald-pulse/20">
          <i data-lucide="shield" class="w-4 h-4 text-emerald-pulse"></i>
        </div>
        <div class="flex flex-col">
          <span class="font-display font-bold text-stardust tracking-tight text-lg leading-none">OPENULTRON</span>
          <span class="text-[8px] uppercase tracking-[0.3em] text-void-600 font-bold mt-1">Autonomous intelligence v1.4</span>
        </div>
      </div>
      
      <div class="flex items-center gap-6">
        <div class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-emerald-pulse/5 border border-emerald-pulse/10">
          <span class="h-1.5 w-1.5 rounded-full bg-emerald-pulse shadow-emerald-glow animate-pulse-emerald"></span>
          <span class="text-[9px] font-bold uppercase tracking-widest text-emerald-pulse">Neural Link Active</span>
        </div>
      </div>
    </header>

    <main class="relative z-10 flex-grow container mx-auto px-6 py-6 max-w-7xl">
      {% block content %}{% endblock %}
    </main>

    <footer class="relative z-10 px-8 py-6 border-t border-white/[0.03] flex items-center justify-between">
      <div class="flex items-center gap-4">
        <p class="text-[9px] text-void-600 font-mono tracking-widest uppercase">Monolithic Core // Pulse-Enabled</p>
      </div>
      <div class="flex items-center gap-4 text-void-700">
         <i data-lucide="github" class="w-4 h-4 hover:text-mist cursor-pointer transition-colors"></i>
         <i data-lucide="terminal" class="w-4 h-4 hover:text-mist cursor-pointer transition-colors"></i>
      </div>
    </footer>

    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/sse.js"></script>
    <script>
      const LOGS_SCROLL_ID = "logs-scroll";
      const LOGS_ENTRIES_ID = "logs-entries";

      function isNearBottom(container) {
        return container.scrollHeight - container.scrollTop - container.clientHeight < 60;
      }

      function scrollLogsToBottom() {
        const container = document.getElementById(LOGS_SCROLL_ID);
        if (container) {
          container.scrollTo({
            top: container.scrollHeight,
            behavior: 'smooth'
          });
        }
      }

      lucide.createIcons();
      document.addEventListener("DOMContentLoaded", scrollLogsToBottom);

      document.body.addEventListener("htmx:beforeSwap", function(evt) {
        if (evt.target && evt.target.id === LOGS_ENTRIES_ID) {
          const container = document.getElementById(LOGS_SCROLL_ID);
          if (container) {
            container.dataset.autoscroll = isNearBottom(container) ? "1" : "0";
          }
        }
      });

      document.body.addEventListener("htmx:afterSwap", function(evt) {
        if (evt.target && evt.target.id === LOGS_ENTRIES_ID) {
          const container = document.getElementById(LOGS_SCROLL_ID);
          if (container && container.dataset.autoscroll === "1") {
            scrollLogsToBottom();
          }
        }
        lucide.createIcons();
      });
    </script>
  </body>
</html>
