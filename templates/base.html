<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenUltron // Autonomous Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Sora:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              obsidian: {
                950: "#05070a",
                900: "#0b0f17",
                850: "#101623",
                800: "#141b2d",
                700: "#1c253c",
                600: "#2a3554",
              },
              neon: {
                DEFAULT: "#2ee38f",
                50: "#f0fdf4",
                300: "#78ffd1",
                400: "#4ef9a4",
                500: "#2ee38f",
                600: "#1fb07a",
              },
              cyber: {
                pink: "#ff2e89",
                blue: "#00d1ff",
                yellow: "#ffd300",
              }
            },
            fontFamily: {
              display: ["Sora", "sans-serif"],
              body: ["IBM Plex Sans", "sans-serif"],
              mono: ["JetBrains Mono", "monospace"],
            },
            boxShadow: {
              'neon-sm': "0 0 10px rgba(46, 227, 143, 0.2)",
              'neon-md': "0 0 20px rgba(46, 227, 143, 0.3)",
              'neon-lg': "0 0 35px rgba(46, 227, 143, 0.15)",
            },
            animation: {
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'glow': 'glow 2s ease-in-out infinite alternate',
            },
            keyframes: {
              glow: {
                '0%': { boxShadow: '0 0 5px rgba(46, 227, 143, 0.2)' },
                '100%': { boxShadow: '0 0 20px rgba(46, 227, 143, 0.6)' },
              }
            }
          },
        },
      };
    </script>
    <style type="text/tailwindcss">
      @layer base {
        body {
          @apply bg-obsidian-950 text-slate-300 font-body antialiased selection:bg-neon/30 selection:text-neon-300;
        }
        h1, h2, h3, h4 {
          @apply font-display font-semibold text-slate-50 tracking-tight;
        }
      }

      @layer components {
        .glass-panel {
          @apply rounded-2xl border border-white/5 bg-obsidian-900/40 backdrop-blur-md shadow-neon-lg transition-all duration-300;
        }
        .glass-panel:hover {
          @apply border-white/10 bg-obsidian-900/60;
        }
        .neon-border {
          @apply border border-neon/30 shadow-neon-sm;
        }
        .label-caps {
          @apply text-[10px] uppercase tracking-[0.3em] font-bold text-slate-500;
        }
        .nav-link {
          @apply text-sm text-slate-400 hover:text-neon transition-colors duration-200 cursor-pointer flex items-center gap-2;
        }
        .btn-primary {
          @apply relative overflow-hidden rounded-lg bg-neon px-6 py-2.5 text-sm font-bold text-obsidian-950 transition-all hover:bg-neon-400 hover:scale-[1.02] active:scale-[0.98] disabled:opacity-50 disabled:pointer-events-none;
        }
        .btn-secondary {
          @apply rounded-lg border border-white/10 bg-white/5 px-6 py-2.5 text-sm font-semibold text-slate-200 transition-all hover:bg-white/10 hover:border-white/20 active:scale-[0.98];
        }
        .input-cyber {
          @apply w-full rounded-lg border border-white/10 bg-obsidian-800/50 px-4 py-2.5 text-sm text-slate-100 placeholder:text-slate-600 focus:border-neon/50 focus:outline-none focus:ring-1 focus:ring-neon/50 transition-all;
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        .status-dot {
          @apply h-2 w-2 rounded-full;
        }
        .status-dot-running { @apply bg-neon animate-pulse shadow-[0_0_8px_rgba(46,227,143,0.8)]; }
        .status-dot-paused { @apply bg-slate-600; }
        .status-dot-error { @apply bg-cyber-pink animate-pulse shadow-[0_0_8px_rgba(255,46,137,0.8)]; }
      }

      .noise-bg {
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        opacity: 0.015;
      }
    </style>
  </head>
  <body class="relative min-h-screen overflow-x-hidden">
    <!-- Ambient Background -->
    <div class="fixed inset-0 pointer-events-none z-0">
      <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-neon/5 blur-[120px]"></div>
      <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-cyber-blue/5 blur-[120px]"></div>
      <div class="absolute inset-0 noise-bg"></div>
    </div>

    <div class="relative z-10 flex flex-col min-h-screen">
      <!-- Navbar -->
      <nav class="flex items-center justify-between px-8 py-6 border-b border-white/5 bg-obsidian-950/50 backdrop-blur-xl sticky top-0 z-50">
        <div class="flex items-center gap-3">
          <div class="h-10 w-10 flex items-center justify-center rounded-xl bg-neon/10 border border-neon/20 shadow-neon-sm">
             <i data-lucide="zap" class="w-5 h-5 text-neon"></i>
          </div>
          <div>
            <span class="font-display font-bold text-slate-50 tracking-tighter text-xl">OPENULTRON</span>
            <span class="block text-[9px] uppercase tracking-[0.4em] text-slate-500 font-bold -mt-1">Autonomous Agent OS</span>
          </div>
        </div>
        
        <div class="hidden md:flex items-center gap-8">
          <a class="nav-link"><i data-lucide="layout-grid" class="w-4 h-4"></i> Dashboard</a>
          <a class="nav-link"><i data-lucide="database" class="w-4 h-4"></i> Memory</a>
          <a class="nav-link"><i data-lucide="settings" class="w-4 h-4"></i> Settings</a>
        </div>

        <div class="flex items-center gap-4">
           <div id="connection-status" class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-white/5 border border-white/10 text-[10px] font-bold uppercase tracking-wider text-slate-400">
             <span class="h-1.5 w-1.5 rounded-full bg-neon shadow-[0_0_5px_rgba(46,227,143,0.8)]"></span>
             System Online
           </div>
        </div>
      </nav>

      <main class="flex-grow container mx-auto px-6 py-8">
        {% block content %}{% endblock %}
      </main>

      <!-- Footer -->
      <footer class="px-8 py-6 border-t border-white/5 flex flex-col md:flex-row items-center justify-between gap-4">
        <p class="text-xs text-slate-500 font-mono">© 2026 OPENULTRON. v1.4.0-NEON</p>
        <div class="flex items-center gap-6">
          <a class="text-xs text-slate-500 hover:text-neon transition-colors">Documentation</a>
          <a class="text-xs text-slate-500 hover:text-neon transition-colors">GitHub</a>
        </div>
      </footer>
    </div>

    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/sse.js"></script>
    <script>
      const LOGS_SCROLL_ID = "logs-scroll";
      const LOGS_ENTRIES_ID = "logs-entries";

      function isNearBottom(container) {
        return container.scrollHeight - container.scrollTop - container.clientHeight < 40;
      }

      function scrollLogsToBottom() {
        const container = document.getElementById(LOGS_SCROLL_ID);
        if (container) {
          container.scrollTop = container.scrollHeight;
        }
      }

      lucide.createIcons();
      document.addEventListener("DOMContentLoaded", scrollLogsToBottom);

      document.body.addEventListener("htmx:beforeSwap", function(evt) {
        if (evt.target && evt.target.id === LOGS_ENTRIES_ID) {
          const container = document.getElementById(LOGS_SCROLL_ID);
          if (container) {
            container.dataset.autoscroll = isNearBottom(container) ? "1" : "0";
          }
        }
      });

      document.body.addEventListener("htmx:afterSwap", function(evt) {
        if (evt.target && evt.target.id === LOGS_ENTRIES_ID) {
          const container = document.getElementById(LOGS_SCROLL_ID);
          if (container && container.dataset.autoscroll === "1") {
            scrollLogsToBottom();
          }
        }
        lucide.createIcons();
      });
    </script>
  </body>
</html>
