<div id="memory-panel" class="space-y-4">
  {% if memory_content %}
    <div class="rounded-xl bg-obsidian-950/50 p-6 border border-white/5 font-mono text-sm text-slate-400 leading-relaxed overflow-x-auto">
      {{ memory_content | replace("\n", "<br>") | safe }}
    </div>
  {% else %}
    <p class="text-xs text-slate-500 font-mono italic">Sector empty or inaccessible.</p>
  {% endif %}
</div>
