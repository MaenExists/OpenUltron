<div id="memory-panel" class="animate-fade-in">
  <div class="flex flex-col gap-4">
    <div class="flex items-center justify-between">
       <span class="text-[9px] font-mono text-void-700 uppercase tracking-widest">{{ selected_path or "No file selected" }}</span>
       {% if selected_path %}
          <i data-lucide="lock" class="w-3 h-3 text-void-800"></i>
       {% endif %}
    </div>
    
    <div class="rounded-lg border border-white/[0.02] bg-void-950 p-4 font-mono text-[10px] leading-relaxed text-mist/80 selection:bg-emerald-pulse/20 overflow-x-auto">
      {% if memory_content %}
        <pre class="whitespace-pre-wrap"><code>{{ memory_content }}</code></pre>
      {% else %}
        <p class="italic text-void-800 text-center py-8">Vault fragment empty or inaccessible.</p>
      {% endif %}
    </div>
  </div>
</div>
