<div 
  id="logs-scroll" 
  class="flex-grow overflow-y-auto scroll-smooth p-6 font-mono text-[11px] leading-relaxed"
  hx-ext="sse" 
  sse-connect="/stream/logs" 
  sse-swap="message" 
  hx-target="#logs-entries" 
  hx-swap="beforeend"
>
  <div id="logs-entries" class="flex flex-col gap-4">
    {% for entry in logs %}
      {% include "partials/log_entry.html" %}
    {% endfor %}
  </div>
</div>
